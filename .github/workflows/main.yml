name: Update IPTV M3U List

on:
  schedule:
    - cron: '*/10 * * * *'  # Run every 6 hours
  workflow_dispatch:      # Allow manual trigger
    push:
    paths:
      - 'data/inputs/**'  # Run when any input file changes

jobs:
  update-list:
    runs-on: ubuntu-latest
    # Prevent concurrent runs of the same workflow
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run M3U Manager
        env:
          INPUT_DIR: 'data/inputs'
          OUTPUT_M3U: \'public/output.m3u\'
          STATE_FILE: 'data/state.json'
          REPORT_FILE: 'data/report.md'
          TIMEOUT: 10
          MAX_CONCURRENT: 50
        run: python main.py

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add public/output.m3u data/state.json data/report.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update optimized M3U list and state [skip ci]" && git push)

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-report
          path: data/report.md
